plugins {
    id "com.android.application"
    id "kotlin-android"
    id "dev.flutter.flutter-gradle-plugin"
    id "com.google.gms.google-services"
}

def keystoreProperties = new Properties()
def keystorePropertiesFile = rootProject.file("key.properties")
if (keystorePropertiesFile.exists()) {
    keystoreProperties.load(new FileInputStream(keystorePropertiesFile))
}

android {
    namespace "com.nazar.fal"
    compileSdk 36
    ndkVersion flutter.ndkVersion

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
        coreLibraryDesugaringEnabled true
    }

    kotlin {
        compilerOptions {
            jvmTarget.set(org.jetbrains.kotlin.gradle.dsl.JvmTarget.JVM_17)
        }
    }

    defaultConfig {
        applicationId "com.nazar.fal"
        minSdkVersion 24
        targetSdkVersion 36
        versionCode flutter.versionCode
        versionName flutter.versionName
        manifestPlaceholders = [applicationName: "android.app.Application", admobAppId: "ca-app-pub-3940256099942544~3347511713"]
    }

    signingConfigs {
        release {
            keyAlias      keystoreProperties["keyAlias"]     ?: ""
            keyPassword   keystoreProperties["keyPassword"]  ?: ""
            storeFile     keystoreProperties["storeFile"] ? file(keystoreProperties["storeFile"]) : null
            storePassword keystoreProperties["storePassword"] ?: ""
        }
    }

    buildTypes {
        debug {
        }
        release {
            signingConfig signingConfigs.release
            minifyEnabled true
            shrinkResources false
            proguardFiles getDefaultProguardFile("proguard-android-optimize.txt"), "proguard-rules.pro"
        }
    }
}

flutter {
    source "../.."
}

// AGP 8.9+ requires explicit build directory redirect for flutter findBundleFile
layout.buildDirectory.set(new File(projectDir, "../../build/app").canonicalFile)

dependencies {
    coreLibraryDesugaring "com.android.tools:desugar_jdk_libs:2.1.4"
}
