name: nazar
description: "Nazar — AI destekli günlük fal uygulaması"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Navigation
  go_router: ^13.2.0

  # Backend
  supabase_flutter: ^2.5.6

  # Monetization
  purchases_flutter: ^7.2.0

  # Ads
  google_mobile_ads: ^5.3.1

  # Analytics / Crash
  firebase_core: ^3.6.0
  firebase_crashlytics: ^4.1.3
  firebase_analytics: ^11.3.3

  # HTTP
  http: ^1.2.1

  # Storage
  shared_preferences: ^2.5.5
  flutter_secure_storage: ^10.0.0

  # Image
  image_picker: ^1.1.2
  cached_network_image: ^3.3.1

  # UI
  google_fonts: ^6.2.1
  shimmer: ^3.0.0
  gap: ^3.0.1

  # Utils
  intl: "0.20.2"
  url_launcher: ^6.3.2
  package_info_plus: ^9.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.13.1
  flutter_native_splash: ^2.4.7
  build_runner: ^2.4.9
  riverpod_generator: ^2.4.3
  custom_lint: ^0.6.4
  riverpod_lint: ^2.3.10
  json_serializable: ^6.13.0

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/images/
    - assets/animations/
    - assets/fonts/

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/icon.png"
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/images/icon_foreground.png"

flutter_native_splash:
  color: "#FFFFFF"
  image: assets/images/splash.png
  android_12:
    color: "#FFFFFF"
    image: assets/images/splash.png
